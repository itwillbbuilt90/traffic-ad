<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinity Traffic Boost - Real Visitors, Real Results</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #030712;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .ad-container {
    width: 468px;
    height: 600px;
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(6, 182, 212, 0.3);
    background: linear-gradient(160deg, #030712 0%, #04152e 40%, #0c1a2e 100%);
    box-shadow:
      0 0 60px rgba(6, 182, 212, 0.15),
      0 0 120px rgba(6, 182, 212, 0.05),
      0 25px 50px rgba(0,0,0,0.5);
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .ad-container:hover {
    transform: scale(1.02);
    box-shadow:
      0 0 80px rgba(6, 182, 212, 0.25),
      0 0 160px rgba(6, 182, 212, 0.1),
      0 30px 60px rgba(0,0,0,0.6);
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.4;
    animation: floatOrb 6s ease-in-out infinite;
  }

  .orb-1 {
    width: 200px; height: 200px;
    background: rgba(6, 182, 212, 0.3);
    top: -60px; left: -40px;
    animation-delay: 0s;
  }

  .orb-2 {
    width: 150px; height: 150px;
    background: rgba(59, 130, 246, 0.2);
    bottom: 80px; right: -50px;
    animation-delay: -2s;
  }

  .orb-3 {
    width: 120px; height: 120px;
    background: rgba(6, 182, 212, 0.15);
    bottom: -30px; left: 60px;
    animation-delay: -4s;
  }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(15px, -20px) scale(1.1); }
    66% { transform: translate(-10px, 15px) scale(0.95); }
  }

  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
    background-size: 30px 30px;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 32px 28px;
    text-align: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(6, 182, 212, 0.1);
    border: 1px solid rgba(6, 182, 212, 0.3);
    border-radius: 50px;
    padding: 6px 16px;
    font-size: 11px;
    font-weight: 600;
    color: #22d3ee;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 20px;
    animation: fadeSlideDown 0.8s ease-out 0.2s both;
  }

  .badge-dot {
    width: 6px; height: 6px;
    background: #06b6d4;
    border-radius: 50%;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }

  .icon-wrap {
    width: 72px; height: 72px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), rgba(59, 130, 246, 0.1));
    border: 1px solid rgba(6, 182, 212, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    animation: fadeSlideDown 0.8s ease-out 0.4s both;
    position: relative;
  }

  .icon-wrap::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(6,182,212,0.4), transparent, rgba(59,130,246,0.3));
    z-index: -1;
    filter: blur(8px);
  }

  .icon-wrap svg {
    width: 36px; height: 36px;
    color: #06b6d4;
  }

  h1 {
    font-size: 28px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.15;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
    animation: fadeSlideDown 0.8s ease-out 0.5s both;
  }

  h1 .highlight {
    background: linear-gradient(to right, #06b6d4, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 14px;
    font-weight: 400;
    color: #94a3b8;
    line-height: 1.6;
    margin-bottom: 24px;
    animation: fadeSlideDown 0.8s ease-out 0.6s both;
    max-width: 360px;
  }

  /* Checklist style */
  .checklist {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
    width: 100%;
    max-width: 320px;
    animation: fadeSlideDown 0.8s ease-out 0.7s both;
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 10px;
    padding: 10px 16px;
    transition: background 0.3s, border-color 0.3s;
  }

  .check-item:hover {
    background: rgba(6, 182, 212, 0.05);
    border-color: rgba(6, 182, 212, 0.15);
  }

  .check-icon {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: rgba(6, 182, 212, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .check-icon svg {
    width: 14px; height: 14px;
    color: #22d3ee;
  }

  .check-text {
    font-size: 13px;
    font-weight: 500;
    color: #e2e8f0;
    text-align: left;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(to bottom right, #22d3ee, #2563eb);
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.01em;
    padding: 14px 36px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    animation: fadeSlideUp 0.8s ease-out 0.9s both;
    box-shadow: 0 0 30px rgba(6, 182, 212, 0.3);
  }

  .cta-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom right, rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .cta-btn:hover::before { opacity: 1; }

  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 50px rgba(6, 182, 212, 0.5);
  }

  .cta-btn:active { transform: translateY(0); }

  .cta-btn svg {
    width: 18px; height: 18px;
    transition: transform 0.3s;
  }

  .cta-btn:hover svg { transform: translateX(3px); }

  .btn-shimmer {
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0% { left: -100%; }
    50%, 100% { left: 100%; }
  }

  .bottom-text {
    margin-top: 18px;
    font-size: 11px;
    color: #475569;
    animation: fadeSlideUp 0.8s ease-out 1.1s both;
  }

  .bottom-text span {
    color: #22d3ee;
    font-weight: 600;
  }

  .traffic-lines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 1;
  }

  .traffic-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.3), transparent);
    animation: trafficMove 4s linear infinite;
  }

  .traffic-line:nth-child(1) { top: 15%; width: 60%; left: -60%; animation-duration: 3.5s; animation-delay: 0s; }
  .traffic-line:nth-child(2) { top: 35%; width: 45%; left: -45%; animation-duration: 4.2s; animation-delay: 1s; }
  .traffic-line:nth-child(3) { top: 55%; width: 55%; left: -55%; animation-duration: 3.8s; animation-delay: 0.5s; }
  .traffic-line:nth-child(4) { top: 75%; width: 40%; left: -40%; animation-duration: 4.5s; animation-delay: 1.5s; }
  .traffic-line:nth-child(5) { top: 90%; width: 50%; left: -50%; animation-duration: 3.2s; animation-delay: 2s; }

  @keyframes trafficMove {
    0% { transform: translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateX(calc(468px + 100%)); opacity: 0; }
  }

  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: rgba(6, 182, 212, 0.5);
    border-radius: 50%;
    animation: floatParticle 8s linear infinite;
    z-index: 1;
  }

  .particle:nth-child(1) { left: 10%; bottom: -5px; animation-delay: 0s; animation-duration: 7s; }
  .particle:nth-child(2) { left: 30%; bottom: -5px; animation-delay: 1.5s; animation-duration: 8s; }
  .particle:nth-child(3) { left: 50%; bottom: -5px; animation-delay: 3s; animation-duration: 6.5s; }
  .particle:nth-child(4) { left: 70%; bottom: -5px; animation-delay: 4.5s; animation-duration: 9s; }
  .particle:nth-child(5) { left: 90%; bottom: -5px; animation-delay: 2s; animation-duration: 7.5s; }

  @keyframes floatParticle {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-620px) scale(0.3); opacity: 0; }
  }

  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 500px) {
    .ad-container {
      width: 95vw;
      height: auto;
      min-height: 600px;
    }

  }
</style>
